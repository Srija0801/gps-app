apiVersion: apps/v1
kind: Deployment
metadata:
  name: gps-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: gps-app

  template:
    metadata:
      labels:
        app: gps-app

    spec:
      containers:
        - name: gps-container
          image: srija-service2
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
